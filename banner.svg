<svg width="700" height="180" viewBox="0 0 700 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgU" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f0a"/>
      <stop offset="100%" stop-color="#040604"/>
    </linearGradient>

    <pattern id="gridU" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#00ff41" stroke-width="0.4" opacity="0.1"/>
    </pattern>

    <radialGradient id="radarU" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#00ff41" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="vignetteU" cx="50%" cy="50%" r="78%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </radialGradient>

    <pattern id="scanlinesU" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#000000" opacity="0.14"/>
    </pattern>

    <linearGradient id="rainFadeU" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0"/>
      <stop offset="55%" stop-color="#00ff41" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#00ff41" stop-opacity="0.65"/>
    </linearGradient>

    <linearGradient id="lineFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00ff41" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00ff41" stop-opacity="0"/>
    </linearGradient>

    <filter id="neonGlowU" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4.5" result="b1"/>
      <feMerge>
        <feMergeNode in="b1"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlowU" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <filter id="borderGlowU" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <style>
      .mono { font-family: 'Consolas', 'Courier New', monospace; }
      .prompt { font-size: 18px; font-weight: 700; fill: #00ff41; opacity: 0.9; }
      .path   { font-size: 18px; font-weight: 700; fill: #4dd0e1; opacity: 0.9; }
      .main   { font-size: 60px; font-weight: 900; fill: #00ff41; }
      .glitch-r { font-size: 60px; font-weight: 900; fill: #ff2050; opacity: 0.45; }
      .glitch-b { font-size: 60px; font-weight: 900; fill: #00d0ff; opacity: 0.45; }
      .sub    { font-size: 13px; fill: #8a8a8a; letter-spacing: 0.5px; }
      .status { font-size: 12px; fill: #00ff41; opacity: 0.65; }
      .rain   { font-family: 'Consolas', monospace; font-size: 13px; fill: url(#rainFadeU); opacity: 0.28; }
      .tag    { font-size: 11px; fill: #00ff41; opacity: 0.55; letter-spacing: 1px; }
    </style>
  </defs>

  <rect width="700" height="180" fill="url(#bgU)"/>
  <rect width="700" height="180" fill="url(#gridU)"/>


  <rect x="4" y="4" width="692" height="172" rx="6" fill="none" stroke="#00ff41" stroke-width="1.4" filter="url(#borderGlowU)">
    <animate attributeName="stroke" values="#00ff41;#00d0ff;#00ff41" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
  </rect>

  <g stroke="#00ff41" stroke-width="2" fill="none">
    <path d="M14,26 L14,14 L26,14"/>
    <path d="M674,14 L686,14 L686,26"/>
    <path d="M686,154 L686,166 L674,166"/>
    <path d="M26,166 L14,166 L14,154"/>
    <animate attributeName="opacity" values="0.35;0.85;0.35" dur="2.4s" repeatCount="indefinite"/>
  </g>

  <rect x="0" width="700" height="3" fill="#00ff41" opacity="0.06">
    <animate attributeName="y" values="0;180;0" dur="4.5s" repeatCount="indefinite"/>
  </rect>

  <text x="34" y="38" class="mono prompt">eth0@cachyos</text>
  <text x="196" y="38" class="mono path">:~$ whoami</text>

  <line x1="34" y1="50" x2="666" y2="50" stroke="url(#lineFade)" stroke-width="1" opacity="0.5"/>s
  <text x="32" y="128" class="mono main" filter="url(#softGlowU)" opacity="0.45">eth0</text>

  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0 0; -3 1; 2 -1; 0 0; 0 0; 0 0; 3 0; 0 0"
      keyTimes="0;0.02;0.04;0.06;0.5;0.96;0.98;1"
      dur="4.2s" repeatCount="indefinite"/>
    <text x="35" y="128" class="mono glitch-r">eth0</text>
  </g>
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0 0; 3 -1; -2 1; 0 0; 0 0; 0 0; -3 0; 0 0"
      keyTimes="0;0.02;0.04;0.06;0.5;0.96;0.98;1"
      dur="4.2s" repeatCount="indefinite"/>
    <text x="29" y="128" class="mono glitch-b">eth0</text>
  </g>

  <text x="32" y="128" class="mono main" filter="url(#neonGlowU)">
    eth0
    <animate attributeName="opacity" values="1;0.88;1" dur="2.6s" repeatCount="indefinite"/>
  </text>

  <rect x="228" y="88" width="22" height="46" fill="#00ff41" filter="url(#neonGlowU)">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <text x="34" y="150" class="mono sub">penetration tester · reverse engineering</text>

  <text x="34" y="167" class="mono status">[+] interface up · status: active</text>

  <rect width="700" height="180" fill="url(#scanlinesU)" opacity="0.4"/>
  <rect width="700" height="180" fill="url(#vignetteU)"/>

  <rect width="700" height="180" fill="#00ff41" opacity="0">
    <animate attributeName="opacity" values="0;0;0.05;0;0;0;0.03;0" keyTimes="0;0.3;0.31;0.33;0.7;0.71;0.72;1" dur="7s" repeatCount="indefinite"/>
  </rect>
</svg>
